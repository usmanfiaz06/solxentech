<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="SolXen Tech mark">
  <defs>
    <linearGradient id="sx-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDBA74"/>
      <stop offset="0.45" stop-color="#F97316"/>
      <stop offset="1" stop-color="#C2410C"/>
    </linearGradient>
  </defs>
  <g transform="translate(100,100)" fill="url(#sx-grad)">
    <!-- long blades -->
    <g id="sx-blade-l"><rect x="-3.2" y="-90" width="6.4" height="30" rx="3.2"/></g>
    <use href="#sx-blade-l" transform="rotate(30)"/>
    <use href="#sx-blade-l" transform="rotate(60)"/>
    <use href="#sx-blade-l" transform="rotate(90)"/>
    <use href="#sx-blade-l" transform="rotate(120)"/>
    <use href="#sx-blade-l" transform="rotate(150)"/>
    <use href="#sx-blade-l" transform="rotate(180)"/>
    <use href="#sx-blade-l" transform="rotate(210)"/>
    <use href="#sx-blade-l" transform="rotate(240)"/>
    <use href="#sx-blade-l" transform="rotate(270)"/>
    <use href="#sx-blade-l" transform="rotate(300)"/>
    <use href="#sx-blade-l" transform="rotate(330)"/>
    <!-- short blades, offset 15 -->
    <g id="sx-blade-s"><rect x="-2.6" y="-82" width="5.2" height="18" rx="2.6"/></g>
    <use href="#sx-blade-s" transform="rotate(15)"/>
    <use href="#sx-blade-s" transform="rotate(45)"/>
    <use href="#sx-blade-s" transform="rotate(75)"/>
    <use href="#sx-blade-s" transform="rotate(105)"/>
    <use href="#sx-blade-s" transform="rotate(135)"/>
    <use href="#sx-blade-s" transform="rotate(165)"/>
    <use href="#sx-blade-s" transform="rotate(195)"/>
    <use href="#sx-blade-s" transform="rotate(225)"/>
    <use href="#sx-blade-s" transform="rotate(255)"/>
    <use href="#sx-blade-s" transform="rotate(285)"/>
    <use href="#sx-blade-s" transform="rotate(315)"/>
    <use href="#sx-blade-s" transform="rotate(345)"/>
    <!-- central four-point spark -->
    <path d="M 0 -44 C 5 -16 16 -5 44 0 C 16 5 5 16 0 44 C -5 16 -16 5 -44 0 C -16 -5 -5 -16 0 -44 Z"/>
  </g>
</svg>
